name: CI/CD

on:
  push:
    branches: [main, Thomas]
  pull_request:
    branches: [main]

env:
  LOCATION: europe-west1
  PROJECT_ID: tokyo-bedrock-483613-j3
  REPOSITORY: mental-health
  IMAGE: europe-west1-docker.pkg.dev/tokyo-bedrock-483613-j3/mental-health/mental-health-api:latest

jobs:
  # ─────────────────────────────────────────
  # JOB 1 : Lint (ruff)
  # ─────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check . --exclude "*.ipynb"

      - name: Format check
        run: ruff format --check . --exclude "*.ipynb"

  # ─────────────────────────────────────────
  # JOB 2 : Pre-commit hooks
  # ─────────────────────────────────────────
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: pre-commit/action@v3.0.1

  # ─────────────────────────────────────────
  # JOB 3 : Tests (poetry + pytest)
  # ─────────────────────────────────────────
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Run tests
        run: poetry run pytest tests/

  # ─────────────────────────────────────────
  # JOB 4 : Deploy sur Cloud Run
  # Attend que lint + pre-commit + tests soient verts
  # Uniquement sur la branche main (pas sur Thomas, pas sur PR)
  # ─────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [lint, pre-commit, tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Authentification Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configurer Docker pour Artifact Registry
        run: gcloud auth configure-docker ${{ env.LOCATION }}-docker.pkg.dev --quiet

      - name: Build de l'image Docker
        run: docker build -t ${{ env.IMAGE }} -f Dockerfile .

      - name: Push vers Artifact Registry
        run: docker push ${{ env.IMAGE }}

      - name: Déploiement sur Cloud Run
        run: |
          gcloud run deploy mental-health-api \
            --image ${{ env.IMAGE }} \
            --region ${{ env.LOCATION }} \
            --project ${{ env.PROJECT_ID }} \
            --allow-unauthenticated \
            --memory 4Gi \
            --set-env-vars DATABASE_URL=${{ secrets.DATABASE_URL }},CORS_ALLOWED_ORIGINS='*',GDRIVE_MODEL_FOLDER_ID=${{ secrets.GDRIVE_MODEL_FOLDER_ID }}

      - name: Vérification santé de l'API
        run: |
          URL=$(gcloud run services describe mental-health-api \
            --region ${{ env.LOCATION }} \
            --format 'value(status.url)')
          echo "URL déployée : $URL"
          curl --fail "$URL/health" || exit 1
