services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    env_file:
      - .env
    environment:
      API_URL: http://api:8000
      API_URL_LOCAL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      - api
